# The URL must match the DB name you created in phpMyAdmin
spring.datasource.url=jdbc:mysql://localhost:3306/journaldb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

# Standard XAMPP/phpMyAdmin credentials
spring.datasource.username=root
spring.datasource.password=

# This helps Hibernate translate Java to the right SQL version
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver